name: Build Flutter

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Generate Flutter platforms
        working-directory: apps/flutter_app
        run: flutter create . --platforms=windows --project-name=real_church_manager --org=vn.realdev.realchurchmanager
      - name: Pub get
        working-directory: apps/flutter_app
        run: flutter pub get
      - name: Build Windows
        working-directory: apps/flutter_app
        run: flutter build windows --release
      - name: Zip artifact
        working-directory: apps/flutter_app/build/windows/x64/runner/Release
        run: Compress-Archive -Path .\* -DestinationPath ${{ github.workspace }}\real-cm-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: real-cm-windows
          path: real-cm-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Generate Flutter platforms
        working-directory: apps/flutter_app
        run: flutter create . --platforms=macos --project-name=real_church_manager --org=vn.realdev.realchurchmanager
      - name: Pub get
        working-directory: apps/flutter_app
        run: flutter pub get
      - name: Build macOS
        working-directory: apps/flutter_app
        run: flutter build macos --release
      - name: Zip artifact
        working-directory: apps/flutter_app/build/macos/Build/Products/Release
        run: zip -r -y ${{ github.workspace }}/real-cm-macos.zip real_church_manager.app
      - uses: actions/upload-artifact@v4
        with:
          name: real-cm-macos
          path: real-cm-macos.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Generate Flutter platforms
        working-directory: apps/flutter_app
        run: flutter create . --platforms=android --project-name=real_church_manager --org=vn.realdev.realchurchmanager
      - name: Pub get
        working-directory: apps/flutter_app
        run: flutter pub get
      - name: Build APK
        working-directory: apps/flutter_app
        run: flutter build apk --release
      - name: Rename APK
        run: cp apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk real-cm-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: real-cm-android
          path: real-cm-android.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Generate Flutter platforms
        working-directory: apps/flutter_app
        run: flutter create . --platforms=linux --project-name=real_church_manager --org=vn.realdev.realchurchmanager
      - name: Pub get
        working-directory: apps/flutter_app
        run: flutter pub get
      - name: Build Linux
        working-directory: apps/flutter_app
        run: flutter build linux --release
      - name: Tar artifact
        working-directory: apps/flutter_app/build/linux/x64/release/bundle
        run: tar -czf ${{ github.workspace }}/real-cm-linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: real-cm-linux
          path: real-cm-linux.tar.gz
